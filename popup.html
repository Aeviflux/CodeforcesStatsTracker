<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>设置 CF 统计参数</title>
  <style>
    body { font-family: Arial, sans-serif; width: 300px; padding: 15px; background: #f9f9f9; }
    .input-group { display: flex; flex-direction: column; gap: 5px; margin-bottom: 15px; }
    input { padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
    button { padding: 10px; background-color: #0056b3; color: white; border: none; border-radius: 4px; cursor: pointer; width: 100%; }
    button:hover { background-color: #004494; }
    #status { margin-top: 10px; color: green; font-size: 12px; text-align: center; display: none; }
  </style>
</head>
<body>
  <h3>STAT 插件设置</h3>
  <div class="input-group">
    <label for="handles">输入用户名 (逗号分隔):</label>
    <input type="text" id="handles" placeholder="例如: tourist, Benq">
  </div>
  <div class="input-group">
    <label for="days">统计天数:</label>
    <input type="number" id="days" min="1">
  </div>
  <button id="saveBtn">保存设置</button>
  <div id="status">设置已保存！请前往网页点击 STAT 按钮。</div>
  
  <script src="popup.js"></script>
</body>
</html>
